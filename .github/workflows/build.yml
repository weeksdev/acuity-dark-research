name: Build VSIX

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Install dependencies
        run: npm install
      - name: Build VSIX
        run: npx vsce package
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: acuity-dark-research-vsix
          path: '*.vsix'
