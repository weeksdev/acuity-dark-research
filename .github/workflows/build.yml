name: Build VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build VSIX
        run: npx vsce package
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: acuity-dark-research-vsix
          path: '*.vsix'

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: acuity-dark-research-vsix
      - name: Delete old main-latest tag and release
        run: |
          gh release delete "main-latest" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          git push origin --delete refs/tags/main-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'main-latest'
          name: 'Main branch latest build'
          body: 'Latest VSIX build from the main branch.'
          draft: false
          prerelease: false
          files: '*.vsix'
